name: 🚀 Magic AI Pipeline - CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Executar pipeline diariamente às 2 AM UTC
    - cron: '0 2 * * *'

env:
  NODE_VERSION: '22.13.0'
  REGISTRY: ghcr.io

jobs:
  # ============================================================================
  # JOB 1: VALIDAÇÃO E TESTES
  # ============================================================================
  validate-and-test:
    name: 🧪 Validação e Testes
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: MTG_TEST
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📚 Install dependencies
        run: npm ci

      - name: 🔍 Lint code
        run: npm run lint --if-present
        continue-on-error: true

      - name: 🧪 Run tests
        env:
          DATABASE_URL: postgresql://postgres:test_password@localhost:5432/MTG_TEST
        run: npm test --if-present
        continue-on-error: true

      - name: ✅ Validate critical fixes
        env:
          DATABASE_URL: postgresql://postgres:test_password@localhost:5432/MTG_TEST
        run: npm run test:critical-fixes --if-present
        continue-on-error: true

  # ============================================================================
  # JOB 2: BUILD E ANÁLISE
  # ============================================================================
  build-and-analyze:
    name: 🏗️ Build e Análise
    runs-on: ubuntu-latest
    needs: validate-and-test

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📚 Install dependencies
        run: npm ci

      - name: 🏗️ Build project
        run: npm run build --if-present

      - name: 📊 Analyze bundle size
        run: npm run analyze:bundle --if-present
        continue-on-error: true

      - name: 🔐 Security audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

  # ============================================================================
  # JOB 3: RELATÓRIO E NOTIFICAÇÕES
  # ============================================================================
  report:
    name: 📋 Relatório Final
    runs-on: ubuntu-latest
    needs: [validate-and-test, build-and-analyze]
    if: always()

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📊 Generate report
        run: |
          echo "# 🚀 Magic AI Pipeline - Build Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## ✅ Status" >> $GITHUB_STEP_SUMMARY
          echo "- Validation: ${{ needs.validate-and-test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Build: ${{ needs.build-and-analyze.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📝 Commit Info" >> $GITHUB_STEP_SUMMARY
          echo "- SHA: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Author: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY

      - name: 💬 Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🚀 Magic AI Pipeline\n\n✅ Validation: ${{ needs.validate-and-test.result }}\n✅ Build: ${{ needs.build-and-analyze.result }}\n\n[View workflow run](${context.payload.pull_request.html_url}/checks)`
            })
